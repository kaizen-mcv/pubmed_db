# PubMed download configuration.
# Official NCBI usage policies: https://www.ncbi.nlm.nih.gov/books/NBK25497/

# === NCBI RATE LIMITS ===
rate_limiting:
  # With a free API key: up to 10 requests/second.
  # Without: up to 3 requests/second.
  requests_per_second: 3

  # Minimum delay between requests, in seconds.
  min_delay_between_requests: 0.34  # ~3 requests/second

  # Off-peak window is more permissive (weekends, 9pm-5am EST).
  requests_per_second_off_peak: 10
  min_delay_off_peak: 0.1

# === BATCHING ===
batch:
  # IDs to process per batch (efetch accepts up to 500).
  ids_per_batch: 200

  # Results per search (esearch retmax).
  search_batch_size: 10000

  # Max retries per transient error.
  max_retries: 3

  # Seconds between retries (exponential backoff is applied).
  retry_delay: 5

  # Safety pause between batches, in seconds.
  batch_delay: 30

# === DOWNLOAD ===
download:
  # NCBI E-utilities requires a real email address: it is mandatory and
  # NCBI may contact you if your requests cause problems.
  email: "your-email@example.com"

  # Optional API key (raises the rate limit to 10 req/s).
  # Get one for free at: https://www.ncbi.nlm.nih.gov/account/settings/
  api_key: null

  # Entrez database to query.
  database: "pubmed"

  # efetch return type.
  rettype: "xml"

  # Return mode.
  retmode: "xml"

# === SEARCH QUERY ===
search:
  # Main search expression (tweak to taste).
  query: "Spain[Affiliation]"

  # Optional date range. Accepted formats: YYYY/MM/DD, YYYY/MM, YYYY.
  date_from: "2015/01/01"
  date_to: "2025/12/31"

  # Maximum number of articles to download (null = unlimited).
  max_articles: null

# === STATE MANAGEMENT ===
state:
  # File used to persist download progress (for --resume).
  state_file: "data/download_state.json"

  # How often to flush state to disk (every N articles).
  save_frequency: 100

  # Directory for logs.
  log_dir: "data/logs"

  # Log level: DEBUG, INFO, WARNING, ERROR.
  log_level: "INFO"

# === DATABASE WRITE BEHAVIOUR ===
database_config:
  # COMMIT every N articles.
  commit_frequency: 50

  # Wrap batches in transactions for better throughput.
  use_transactions: true

  # Reserved for future connection-pool tuning.
  connection_pool_size: 5

# === FAULT TOLERANCE ===
fault_tolerance:
  # Keep going on malformed records.
  skip_malformed_records: true

  # Keep going on database errors.
  skip_db_errors: true

  # Dump failed records to a side file.
  save_error_records: true
  error_file: "data/error_records.json"
